[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary info for all failures/errors
addopts =
    -v
    --tb=short
    --strict-markers

markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests that require external services
