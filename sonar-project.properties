sonar.projectKey=eventra
sonar.projectName=Eventra
sonar.projectVersion=1.0

sonar.sources=services,frontend/src
sonar.tests=\
  services/gateway/tests,\
  services/auth-service/tests,\
  services/event-service/tests,\
  services/registration-service/tests,\
  services/admin-service/tests,\
  frontend/src/tests,\
  frontend/e2e

sonar.sourceEncoding=UTF-8

sonar.python.version=3.12
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.python.coverage.reportPaths=coverage.xml,services/**/coverage.xml

sonar.exclusions=\
  **/tests/**,\
  frontend/e2e/**,\
  **/__pycache__/**,\
  **/.pytest_cache/**,\
  **/.venv/**,\
  **/venv/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/playwright-report/**,\
  **/test-results/**,\
  **/migrations/versions/**,\
  frontend-current/**,\
  frontendv2/**,\
  docs/**/*.pdf

sonar.test.inclusions=\
  **/tests/**,\
  **/*.test.js,\
  **/*.test.jsx,\
  **/*.spec.js,\
  **/*.spec.jsx

sonar.coverage.exclusions=\
  **/tests/**,\
  **/migrations/**,\
  **/run.py,\
  frontend/src/main.jsx,\
  frontend/src/App.jsx
