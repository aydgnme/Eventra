name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend Tests ─────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - event-service
          - registration-service
          - admin-service
          - gateway

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall -q .

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── Frontend Build ────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:5000
          VITE_OAUTH_BASE: http://localhost:5000

  # ── Docker Build Check ───────────────────
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CI env file
        run: cp .env.example .env

      - name: Validate Compose config
        run: docker compose --env-file .env.example -f docker-compose.yml config
        env:
          EVENTRA_ENV_FILE: .env.example

      - name: Build all images
        run: docker compose --env-file .env.example -f docker-compose.yml build
        env:
          EVENTRA_ENV_FILE: .env.example

  # ── CI Summary Report ──────────────────────
  ci-report:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, docker-build]
    if: always()
    steps:
      - name: Generate CI report
        run: |
          {
            echo "## CI Report - Eventra - $(date '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Check | Status |"
            echo "|---|---|"
            echo "| Backend tests (5 services) | ${{ needs.backend-tests.result == 'success' && ':white_check_mark: Passed' || ':x: Failed' }} |"
            echo "| Frontend build & lint | ${{ needs.frontend-build.result == 'success' && ':white_check_mark: Passed' || ':x: Failed' }} |"
            echo "| Docker build | ${{ needs.docker-build.result == 'success' && ':white_check_mark: Passed' || ':x: Failed' }} |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Triggered by | ${{ github.actor }} |"
          } >> $GITHUB_STEP_SUMMARY
