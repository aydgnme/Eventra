name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: aydgnme
  SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      deploy_enabled: ${{ steps.deploy.outputs.enabled }}
    steps:
      - id: deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_SSH_KEY" ] && [ -n "$DEPLOY_PATH" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  publish-backend-images:
    needs: config
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - service: gateway
            context: services/gateway
            image: eventra-gateway
          - service: auth-service
            context: services/auth-service
            image: eventra-auth-service
          - service: event-service
            context: services/event-service
            image: eventra-event-service
          - service: registration-service
            context: services/registration-service
            image: eventra-registration-service
          - service: admin-service
            context: services/admin-service
            image: eventra-admin-service

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ env.SOURCE_SHA }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  publish-report:
    needs: [config, publish-backend-images]
    if: always() && needs.publish-backend-images.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Image publish report
        run: |
          {
            echo "## Image Publish Report - $(date '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Image | Tag |"
            echo "|---|---|"
            echo "| eventra-gateway | \`${{ env.SOURCE_SHA }}\` |"
            echo "| eventra-auth-service | \`${{ env.SOURCE_SHA }}\` |"
            echo "| eventra-event-service | \`${{ env.SOURCE_SHA }}\` |"
            echo "| eventra-registration-service | \`${{ env.SOURCE_SHA }}\` |"
            echo "| eventra-admin-service | \`${{ env.SOURCE_SHA }}\` |"
            echo ""
            echo "Registry: \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}\`"
            echo ""
            echo "Deploy enabled: **${{ needs.config.outputs.deploy_enabled }}**"
          } >> $GITHUB_STEP_SUMMARY

  deploy-backend:
    needs:
      - config
      - publish-backend-images
    if: ${{ needs.config.outputs.deploy_enabled == 'true' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/eventra_deploy_key
          chmod 600 ~/.ssh/eventra_deploy_key
          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Deploy backend stack
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN || github.token }}
          GHCR_USER: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/eventra_deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -e
             cd '$DEPLOY_PATH'
             git fetch origin main
             git checkout main
             git pull --ff-only origin main
             echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin
             EVENTRA_ENV_FILE=.env docker compose -f docker-compose.yml -f docker-compose.deploy.yml pull gateway auth-service event-service registration-service admin-service
             EVENTRA_ENV_FILE=.env docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d db redis auth-service event-service registration-service admin-service gateway
             EVENTRA_ENV_FILE=.env docker compose -f docker-compose.yml -f docker-compose.deploy.yml ps"

      - name: Deploy report
        if: always()
        run: |
          {
            echo "## CD Deploy Report - Eventra - $(date '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Detail | Value |"
            echo "|---|---|"
            echo "| Commit | \`${{ env.SOURCE_SHA }}\` |"
            echo "| Images published | 5 (gateway, auth, event, registration, admin) |"
            echo "| Registry | \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}\` |"
            echo "| Deploy status | ${{ job.status == 'success' && ':white_check_mark: Success' || ':x: Failed' }} |"
          } >> $GITHUB_STEP_SUMMARY
