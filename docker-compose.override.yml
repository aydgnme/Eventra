# Development overrides — automatically loaded by `docker compose up`
# Uses dev Dockerfile targets, mounts source code, enables debug mode.
# For production: docker compose -f docker-compose.yml up

services:
  db:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: eventra

  gateway:
    build:
      target: dev
    ports:
      - "5050:5000"
    volumes:
      - ./services/gateway:/app
    environment:
      - FLASK_ENV=development
      - JWT_SECRET_KEY=super-secret-key-change-in-prod
      - CORS_ORIGINS=http://localhost:5055
    depends_on:
      - auth-service
      - event-service
      - registration-service
      - admin-service
    healthcheck:
      disable: true

  auth-service:
    build:
      target: dev
    ports:
      - "5051:5001"
    volumes:
      - ./services/auth-service:/app
    environment:
      - FLASK_ENV=development
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=eventra
      - JWT_SECRET_KEY=super-secret-key-change-in-prod
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET}
      - OAUTH_GOOGLE_REDIRECT_URI=http://localhost:5050/auth/oauth/google/callback
      - OAUTH_FRONTEND_URL=http://localhost:5055
    healthcheck:
      disable: true

  event-service:
    build:
      target: dev
    ports:
      - "5052:5002"
    volumes:
      - ./services/event-service:/app
    environment:
      - FLASK_ENV=development
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=eventra
      - JWT_SECRET_KEY=super-secret-key-change-in-prod
    healthcheck:
      disable: true

  registration-service:
    build:
      target: dev
    ports:
      - "5053:5003"
    volumes:
      - ./services/registration-service:/app
    environment:
      - FLASK_ENV=development
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=eventra
      - JWT_SECRET_KEY=super-secret-key-change-in-prod
      - EVENT_SERVICE_URL=http://event-service:5002
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - MAIL_FROM=${MAIL_FROM:-Eventra <noreply@eventra.app>}
    depends_on:
      db:
        condition: service_healthy
      event-service:
        condition: service_started
    healthcheck:
      disable: true

  admin-service:
    build:
      target: dev
    ports:
      - "5054:5004"
    volumes:
      - ./services/admin-service:/app
    environment:
      - FLASK_ENV=development
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=eventra
      - JWT_SECRET_KEY=super-secret-key-change-in-prod
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - MAIL_FROM=${MAIL_FROM:-Eventra <noreply@eventra.app>}
    healthcheck:
      disable: true

  frontend:
    build:
      target: dev
    ports: !override
      - "5055:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      gateway:
        condition: service_started
    environment:
      - VITE_API_TARGET=http://gateway:5000
      - VITE_OAUTH_BASE=/api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
