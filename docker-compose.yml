services:

  # ── DATABASE ──────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: eventra-db
    env_file:
      - ${EVENTRA_ENV_FILE:-.env}
    environment:
      POSTGRES_DB: eventra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d eventra"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: eventra-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── GATEWAY ───────────────────────────────
  gateway:
    build:
      context: ./services/gateway
      target: prod
    container_name: eventra-gateway
    env_file:
      - ${EVENTRA_ENV_FILE:-.env}
    environment:
      - FLASK_ENV=production
      - AUTH_SERVICE_URL=http://auth-service:5001
      - EVENT_SERVICE_URL=http://event-service:5002
      - REGISTRATION_SERVICE_URL=http://registration-service:5003
      - ADMIN_SERVICE_URL=http://admin-service:5004
      - CORS_ORIGINS=${CORS_ORIGINS:?Set CORS_ORIGINS in .env}
      - CLOUDFLARE_ONLY=${CLOUDFLARE_ONLY:-true}
      - RATELIMIT_STORAGE_URI=redis://redis:6379/0
    ports:
      - "${GATEWAY_PORT:-5000}:5000"
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      registration-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── AUTH SERVICE ──────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      target: prod
    container_name: eventra-auth
    env_file:
      - ${EVENTRA_ENV_FILE:-.env}
    environment:
      - FLASK_ENV=production
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=eventra
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── EVENT SERVICE ─────────────────────────
  event-service:
    build:
      context: ./services/event-service
      target: prod
    container_name: eventra-event
    env_file:
      - ${EVENTRA_ENV_FILE:-.env}
    environment:
      - FLASK_ENV=production
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=eventra
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── REGISTRATION SERVICE ──────────────────
  registration-service:
    build:
      context: ./services/registration-service
      target: prod
    container_name: eventra-registration
    env_file:
      - ${EVENTRA_ENV_FILE:-.env}
    environment:
      - FLASK_ENV=production
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=eventra
      - EVENT_SERVICE_URL=http://event-service:5002
    depends_on:
      db:
        condition: service_healthy
      event-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5003/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── ADMIN SERVICE ─────────────────────────
  admin-service:
    build:
      context: ./services/admin-service
      target: prod
    container_name: eventra-admin
    env_file:
      - ${EVENTRA_ENV_FILE:-.env}
    environment:
      - FLASK_ENV=production
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=eventra
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5004/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── FRONTEND ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: prod
    container_name: eventra-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
