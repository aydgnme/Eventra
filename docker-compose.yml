version: "3.9"

services:
  backend:
    build: ./backend
    container_name: eventra-backend
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:///eventra.db
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: eventra-frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    container_name: eventra-db
    environment:
      POSTGRES_DB: eventra
      POSTGRES_USER: eventra_user
      POSTGRES_PASSWORD: eventra_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
